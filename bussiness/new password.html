<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Business</title>
    <style>
        body {
            background-color: #90EE90;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Times New Roman", Times, serif;
        }

        /* Combined container for image and form */
        .main-wrapper {
            display: flex;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Image section */
        .img-container img {
            display: block;
            object-fit: cover;
        }

        /* Form section */
        .box {
            padding: 40px;
            width: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login h2 {
            color: green;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            font-size: 22px;
        }

        #form {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Automatic spacing between elements */
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 15px;
            margin-bottom: 4px;
        }

        input {
            padding: 10px;
            font-size: 13px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .cbutton {
            background-color: green;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }

        .cbutton:hover {
            background-color: #006400;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="img-container">
        <img src="hand.jpeg" height="400" width="300" alt="Change Password">
    </div>

    <div class="box">
        <div class="login"><h2>CHANGE PASSWORD</h2></div>
        <form id="form">
            <div class="input-group">
                <label for="iaccount">Account name:</label>
                <input type="text" name="naccount" id="iaccount" class="caccount" placeholder="write your email">
            </div>

            <div class="input-group">
                <label for="ipaccount">New password:</label>
                <input type="password" name="npaccount" id="ipaccount" class="cpaccount" placeholder="new password">
            </div>

            <div class="input-group">
                <label for="icaccount">Confirm password:</label>
                <input type="password" name="ncaccount" id="icaccount" class="ccaccount" placeholder="confirm password">
            </div>

            <button type="button" class="cbutton" id="ibutton" onclick="pr()">LOGIN</button>
        </form>
    </div>
</div>

<script>
/* LOGIC REMAINS EXACTLY AS PROVIDED */
function pr() {
    var x = document.getElementById("ipaccount").value;
    var y = document.getElementById("icaccount").value;
    var z = document.getElementById("iaccount").value;
    if (x == y && z == 'el') {
        const link = "Homepage.html";
        window.open(link, '_blank');
        document.getElementById("iaccount").value = "";
        document.getElementById("ipaccount").value = "";
        document.getElementById("icaccount").value = "";
    } else {
        window.alert('confirm password correctectly');
    }
}

document.addEventListener("DOMContentLoaded", function () {
    const inputs = document.querySelectorAll("#form input");
    inputs.forEach((input, index) => {
        input.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                const nextInput = inputs[index + 1];
                if (nextInput) {
                    nextInput.focus();
                }
            }
        });
    });
});
</script>

</body>
</html>
