<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart AI - Workspace</title>
    <style>
        :root {
            --bg-dark: #05160c;
            --sidebar-green: #1a4a2e;
            --accent-green: #2ecc71;
            --text-glow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: #ecf0f1;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation replacing the previous relative-box structure */
        .sidebar {
            width: 240px;
            background: linear-gradient(to bottom, var(--sidebar-green), #0a2e1a);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 4px 0 15px rgba(0,0,0,0.5);
        }

        .sidebar-header {
            padding: 0 25px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar a {
            text-decoration: none;
            color: #bdc3c7;
            padding: 15px 25px;
            font-size: 0.95rem;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            padding-left: 30px;
        }

        /* The "Active" state highlights which page the user is currently on */
        .sidebar a.active {
            background: rgba(46, 204, 113, 0.15);
            color: var(--accent-green);
            border-left: 4px solid var(--accent-green);
            font-weight: bold;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, #0d361f, var(--bg-dark));
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        .header-bar h1 {
            margin: 0;
            font-weight: 300;
            text-shadow: var(--text-glow);
        }

        /* Data Grid Visualization */
        .data-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            transition: transform 0.3s;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
        }

        .card-label {
            color: var(--accent-green);
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">Smart AI</div>
        <a href="Homepage.html">Home Dashboard</a>
        <a href="page1.html" class="active">Page 1</a>
        <a href="page2.html">Page 2</a>
        <a href="page3.html">Page 3</a>
        <a href="page4.html">Page 4</a>
        <a href="page5.html">Page 5</a>
        <a href="page6.html">Page 6</a>
    </div>

    <div class="main-content">
        <div class="header-bar">
            <h1>Workspace / <span style="color: var(--accent-green);">Page 1</span></h1>
            <div>
                <span class="status-dot"></span> System Online
            </div>
        </div>

        <div class="data-container">
            <div class="glass-card">
                <span class="card-label">Neural Efficiency</span>
                <div class="card-value">98.2%</div>
            </div>
            
            <div class="glass-card">
                <span class="card-label">Active Nodes</span>
                <div class="card-value">1,204</div>
            </div>

            <div class="glass-card" style="grid-column: span 2;">
                <span class="card-label">System Status</span>
                <div class="card-value" style="color: var(--accent-green);">OPTIMIZED</div>
                <p style="color: #888; font-size: 0.8rem; margin-top: 10px;">This page is currently running on the Smart AI core.</p>
            </div>
        </div>
    </div>

</body>
</html>
