<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Business</title>
    <style>
        :root {
            --primary-green: #2ecc71;
            --dark-green: #27ae60;
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #90EE90;
            animation: anime 15s linear infinite;
            overflow-x: hidden;
        }

        @keyframes anime {
            0%   { background-color: #90EE90; }
            33%  { background-color: #7fffd4; } /* Fixed hex code */
            66%  { background-color: #32CD32; }
            100% { background-color: #27ae60; }
        }

        .vibrating-text {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            animation: vibrate 2s linear infinite;
            text-align: center;
        }

        @keyframes vibrate {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, 2px); }
        }

        /* Container for Image and Form */
        .main-container {
            display: flex;
            background: var(--glass-white);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 800px;
            width: 90%;
        }

        .img-section {
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-section img {
            object-fit: cover;
            display: block;
        }

        .box {
            padding: 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .login h2 {
            margin-top: 0;
            color: var(--dark-green);
            font-size: 1.5rem;
            border-bottom: 2px solid var(--primary-green);
            display: inline-block;
            margin-bottom: 25px;
        }

        form label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #444;
        }

        form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Ensures padding doesn't break width */
            transition: border-color 0.3s;
        }

        form input:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 5px rgba(46, 204, 113, 0.3);
        }

        .cbutton {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 16px;
        }

        .cbutton:hover {
            background-color: var(--dark-green);
        }

        .links-container {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .links-container a {
            color: var(--dark-green);
            text-decoration: none;
        }

        .links-container a:hover {
            text-decoration: underline;
        }

        /* Mobile View Adjustment */
        @media (max-width: 600px) {
            .main-container { flex-direction: column; }
            .img-section img { width: 100%; height: 200px; }
        }
    </style>
</head>
<body>

<div class="vibrating-text">WELCOME TO SMART BUSINESS</div>

<div class="main-container">
    <div class="img-section">
        <img src="smart.jpeg" alt="Smart Business" width="300" height="400">
    </div>
    
    <div class="box">
        <div class="login"><h2>CREATE ACCOUNT</h2></div>
        
        <form id="form">
            <label for="iaccount">Account name:</label>
            <input type="text" name="naccount" id="iaccount" placeholder="Email or phone number">
            
            <label for="ipass">Password:</label>
            <input type="password" name="npass" id="ipass" placeholder="Enter your password">
            
            <button type="button" class="cbutton" id="ibutton" onclick="pr()">Submit</button>
        </form>

        <div class="links-container">
            <a href="forgot.html">Forgot password?</a>
            <a href="login.html">Login</a>
        </div>
    </div>
</div>

<script>
    function pr() {
                   document.getElementById('iaccount').value = '';
                   document.getElementById('ipass').value = '';
                  }

    document.addEventListener("DOMContentLoaded", function () {
        const inputs = document.querySelectorAll("#form input");
        inputs.forEach((input, index) => {
            input.addEventListener("keydown", function (event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    const nextInput = inputs[index + 1];
                    if (nextInput) {
                        nextInput.focus();
                    } else {
                        // Optional: trigger submit on last enter
                        pr();
                    }
                }
            });
        });
    });
</script>

</body>
</html>
