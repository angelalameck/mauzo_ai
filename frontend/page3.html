<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart AI - AI Automation</title>
    <style>
        :root {
            --bg-dark: #05160c;
            --sidebar-green: #1a4a2e;
            --accent-green: #2ecc71;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: #ecf0f1;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 240px;
            background: linear-gradient(to bottom, var(--sidebar-green), #0a2e1a);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header {
            padding: 0 25px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-green);
            letter-spacing: 1px;
        }

        .sidebar a {
            text-decoration: none;
            color: #bdc3c7;
            padding: 15px 25px;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .sidebar a.active {
            background: rgba(46, 204, 113, 0.15);
            color: var(--accent-green);
            border-left: 4px solid var(--accent-green);
            font-weight: bold;
        }

        /* Main Area with Slide Animation */
        .main-content {
            flex: 1;
            padding: 40px;
            background: radial-gradient(circle at top right, #0d361f, var(--bg-dark));
            animation: slideIn 0.6s ease-out forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
        }

        h1 { font-weight: 300; margin-bottom: 30px; }
        .highlight { color: var(--accent-green); font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">SMART AI</div>
        <a href="Homepage.html">Home</a>
        <a href="page1.html">Page 1</a>
        <a href="page2.html">Page 2</a>
        <a href="page3.html" class="active">Page 3</a>
        <a href="page4.html">Page 4</a>
        <a href="page5.html">Page 5</a>
        <a href="page6.html">Page 6</a>
    </div>

    <div class="main-content">
        <h1>Module 03 / <span class="highlight">AI Automation</span></h1>
        <div class="glass-card">
            <h3>Neural Workflow Status</h3>
            <p>Automation engine is processing <span class="highlight">412 active threads</span>.</p>
            <p>Redundancy check: Successful.</p>
        </div>
    </div>
</body>
</html>
