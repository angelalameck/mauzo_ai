<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart AI - Page 1</title>
    <style>
        :root { --bg: #05160c; --sidebar: #1a4a2e; --accent: #2ecc71; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* The "Movement" Animation you requested */
        .slide-in { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .sidebar { width: 240px; background: var(--sidebar); display: flex; flex-direction: column; padding: 20px 0; border-right: 1px solid rgba(255,255,255,0.1); }
        .sidebar a { text-decoration: none; color: #bdc3c7; padding: 15px 25px; transition: 0.3s; border-left: 4px solid transparent; }
        .sidebar a:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .sidebar a.active { background: rgba(46, 204, 113, 0.2); color: var(--accent); border-left-color: var(--accent); font-weight: bold; }
        
        .main { flex: 1; padding: 40px; background: radial-gradient(circle at top right, #0d361f, var(--bg)); }
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: var(--accent); margin-top: 0; }
    </style>
</head>
<body class="slide-in">
    <div class="sidebar">
        <a href="Homepage.html">Home</a>
        <a href="page1.html" class="active">Page 1</a>
        <a href="page2.html">Page 2</a>
        <a href="page3.html">Page 3</a>
        <a href="page4.html">Page 4</a>
        <a href="page5.html">Page 5</a>
        <a href="page6.html">Page 6</a>
    </div>
    <div class="main">
        <h1>Analytical Report</h1>
        <div class="card">
            <p>Neural Efficiency: 98.2%</p>
            <p>Status: All systems operational on Page 1.</p>
        </div>
    </div>
</body>
</html>
